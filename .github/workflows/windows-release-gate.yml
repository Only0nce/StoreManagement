name: StoreManagement Windows release gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout validation payload
        uses: actions/checkout@v4

      - name: Decode and expand StoreManagement source
        shell: pwsh
        run: |
          $encoded = Get-Content -LiteralPath "StoreManagement-source.zip.b64" -Raw
          [IO.File]::WriteAllBytes(
            (Join-Path $PWD "StoreManagement-source.zip"),
            [Convert]::FromBase64String($encoded)
          )
          New-Item -ItemType Directory -Path "work" -Force | Out-Null
          Expand-Archive -LiteralPath "StoreManagement-source.zip" -DestinationPath "work" -Force

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Inno Setup 6
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Run clean release gate
        shell: pwsh
        working-directory: work
        run: .\scripts\release-gate.ps1

      - name: Upload release artifacts and test evidence
        uses: actions/upload-artifact@v4
        with:
          name: StoreManagement-v0.6.7-windows-x64
          path: |
            work/artifacts/publish/**
            work/artifacts/installer/*.exe
            work/artifacts/test-results/**
            work/artifacts/RELEASE_MANIFEST_*.txt
          if-no-files-found: error
          retention-days: 30
