name: StoreManagement Windows release gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout validation payload
        uses: actions/checkout@v4

      - name: Decode, verify, and expand StoreManagement source
        shell: pwsh
        run: |
          $partNames = @(
            "StoreManagement-source.7z.b64.part00",
            "StoreManagement-source.7z.b64.part01",
            "StoreManagement-source.7z.b64.part03",
            "StoreManagement-source.7z.b64.part05",
            "StoreManagement-source.7z.b64.part07",
            "StoreManagement-source.7z.b64.part09",
            "StoreManagement-source.7z.b64.part11",
            "StoreManagement-source.7z.b64.part13",
            "StoreManagement-source.7z.b64.tail15",
            "StoreManagement-source.7z.b64.tail16",
            "StoreManagement-source.7z.b64.tail17",
            "StoreManagement-source.7z.b64.tail18",
            "StoreManagement-source.7z.b64.tail19_20",
            "StoreManagement-source.7z.b64.tail21_22"
          )

          foreach ($partName in $partNames) {
            if (-not (Test-Path -LiteralPath $partName)) {
              throw "Source payload part is missing: $partName"
            }
          }

          $segmentDiagnostics = New-Object System.Collections.Generic.List[string]
          $segments = foreach ($partName in $partNames) {
            $normalizedLines = foreach ($line in (Get-Content -LiteralPath $partName)) {
              $normalizedLine = $line.Trim()
              if ($partName -like "*.tail*") {
                $normalizedLine = $normalizedLine -replace '^\+', ''
              }
              $normalizedLine
            }
            $segment = ($normalizedLines -join "") -replace '\s', ''
            $segmentDiagnostics.Add("$partName=$($segment.Length)")
            $segment
          }

          $encoded = ($segments -join "") -replace '\s', ''
          $archive = Join-Path $PWD "StoreManagement-source.7z"
          [IO.File]::WriteAllBytes($archive, [Convert]::FromBase64String($encoded))

          $expectedHash = (Get-Content -LiteralPath "StoreManagement-source.7z.sha256" -Raw).Trim().ToLowerInvariant()
          $actualHash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()

          @(
            "normalized_base64_length=$($encoded.Length)",
            "expected_archive_sha256=$expectedHash",
            "actual_archive_sha256=$actualHash",
            "archive_size=$((Get-Item -LiteralPath $archive).Length)",
            $segmentDiagnostics
          ) | Set-Content -LiteralPath "payload-diagnostics.txt" -Encoding UTF8

          Get-Content -LiteralPath "payload-diagnostics.txt"

          if ($actualHash -ne $expectedHash) {
            throw "Source payload SHA-256 mismatch."
          }

          New-Item -ItemType Directory -Path "work" -Force | Out-Null
          & 7z x $archive "-owork" -y
          if ($LASTEXITCODE -ne 0) {
            throw "7-Zip source expansion failed. Exit code: $LASTEXITCODE"
          }

      - name: Upload payload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: StoreManagement-v0.7.0-payload-diagnostics
          path: payload-diagnostics.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Inno Setup 6
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Run clean release gate
        shell: pwsh
        working-directory: work
        run: .\scripts\release-gate.ps1

      - name: Upload release artifacts and test evidence
        uses: actions/upload-artifact@v4
        with:
          name: StoreManagement-v0.7.0-windows-x64
          path: |
            work/artifacts/publish/**
            work/artifacts/installer/*.exe
            work/artifacts/test-results/**
            work/artifacts/RELEASE_MANIFEST_*.txt
          if-no-files-found: error
          retention-days: 30
