name: StoreManagement Windows release gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout validation payload
        uses: actions/checkout@v4

      - name: Decode, verify, and expand StoreManagement source
        shell: pwsh
        run: |
          $parts = Get-ChildItem -LiteralPath $PWD -Filter "StoreManagement-source.7z.b64.part*" -File | Sort-Object Name
          if ($parts.Count -eq 0) { throw "Source payload parts were not found." }
          $encoded = ($parts | ForEach-Object { Get-Content -LiteralPath $_.FullName -Raw }) -join ""
          $archive = Join-Path $PWD "StoreManagement-source.7z"
          [IO.File]::WriteAllBytes($archive, [Convert]::FromBase64String($encoded))

          $expectedHash = (Get-Content -LiteralPath "StoreManagement-source.7z.sha256" -Raw).Trim().ToLowerInvariant()
          $actualHash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "Source payload SHA-256 mismatch. Expected=$expectedHash Actual=$actualHash"
          }

          New-Item -ItemType Directory -Path "work" -Force | Out-Null
          & 7z x $archive "-owork" -y
          if ($LASTEXITCODE -ne 0) { throw "7-Zip source expansion failed. Exit code: $LASTEXITCODE" }

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Inno Setup 6
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Run clean release gate
        shell: pwsh
        working-directory: work
        run: .\scripts\release-gate.ps1

      - name: Upload release artifacts and test evidence
        uses: actions/upload-artifact@v4
        with:
          name: StoreManagement-v0.7.0-windows-x64
          path: |
            work/artifacts/publish/**
            work/artifacts/installer/*.exe
            work/artifacts/test-results/**
            work/artifacts/RELEASE_MANIFEST_*.txt
          if-no-files-found: error
          retention-days: 30
